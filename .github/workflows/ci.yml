name: ci

on:
  pull_request:
  push:
    branches: [main, master, prod, production]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v5
        with:
          base-ref: ${{ github.event.pull_request.base.sha || github.event.before }}
          head-ref: ${{ github.event.pull_request.head.sha || github.event.after }}
          fail-on-severity: moderate
          fail-on-scopes: runtime, development
          license-check: true
          vulnerability-check: true
          warn-only: false

  semgrep:
    name: Run Semgrep CI Scan
    runs-on: ubuntu-24.04
    container:
      image: semgrep/semgrep
    if: (github.actor != 'dependabot[bot]')
    steps:
      - uses: actions/checkout@v6
      - run: semgrep scan --config auto
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_SECRET }}

  checks:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install browsers
        run: pnpm --prefix harness run setup:e2e

      - name: Run checks
        run: node harness/harness.mjs gate

  # Publish the built site to GitHub Pages — only on a push to the default branch, and only after
  # the full gate is green. Pages must be set to "GitHub Actions" as the build source (Settings →
  # Pages); frontend/public/CNAME pins the custom domain rxdt.dev.
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: checks
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm --dir frontend run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/dist

      - id: deployment
        uses: actions/deploy-pages@v4

      - name: Smoke-test the live deploy
        # Catches stale/partial deploys: the page HTML updated but its hashed
        # /assets/*.css|js did not, so the referenced bundle 404s and the page
        # renders unstyled. Fetch each page and assert every same-origin asset it
        # references resolves 200 on the live site.
        run: |
          set -euo pipefail
          base="${{ steps.deployment.outputs.page_url }}"
          base="${base%/}"
          fail=0
          for page in "" calculator-writeup.html engineering-the-loop.html conference.html; do
            url="$base/$page"
            html="$(curl -fsSL "$url")"
            for asset in $(printf '%s' "$html" | grep -oE '/assets/[A-Za-z0-9._-]+\.(css|js)' | sort -u); do
              code="$(curl -s -o /dev/null -w '%{http_code}' "$base$asset")"
              if [ "$code" != "200" ]; then
                echo "BROKEN: $url references $asset -> HTTP $code"
                fail=1
              fi
            done
          done
          if [ "$fail" -ne 0 ]; then
            echo "Live deploy is serving pages whose assets 404 (stale deploy)."
            exit 1
          fi
          echo "Live deploy assets all resolve."

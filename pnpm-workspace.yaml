packages:
  - "frontend"
  - "harness"

allowBuilds:
  esbuild: true
  "@scarf/scarf": false
  unrs-resolver: false

# Force patched versions of vulnerable dev/transitive deps flagged by the audit check.
# All are pulled in by tooling (lhci, ajv-cli, telemetry), not shipped to consumers.
overrides:
  tmp: ">=0.2.6"
  uuid: ">=11.1.1"
  fast-json-patch: ">=3.1.1"
  fast-uri: ">=3.1.4"
  "@opentelemetry/core": ">=2.8.0"
  # 8.65.0 was unpublished from npm (latest is 8.64.0); pin the whole set so the
  # stale lock entry re-resolves instead of blocking every install.
  "@typescript-eslint/types": "8.64.0"
  "@typescript-eslint/utils": "8.64.0"
  typescript-eslint: "8.64.0"

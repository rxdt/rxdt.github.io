rules:
  workflow-has-name:
    description: GitHub Actions workflows must have a name.
    given: "$"
    severity: error
    then:
      field: name
      function: truthy

  workflow-has-jobs:
    description: GitHub Actions workflows must define at least one job.
    given: "$"
    severity: error
    then:
      field: jobs
      function: truthy

  workflow-uses-read-only-contents:
    description: Workflows must keep default token contents permission read-only.
    given: "$.permissions"
    severity: error
    then:
      field: contents
      function: pattern
      functionOptions:
        match: "^read$"

  workflow-forbids-pull-request-target:
    description: pull_request_target runs untrusted PR code with elevated token context.
    given: "$.on"
    severity: error
    then:
      field: pull_request_target
      function: falsy

  workflow-jobs-must-not-continue-on-error:
    description: Gate jobs must fail closed.
    given: "$.jobs.*"
    severity: error
    then:
      field: continue-on-error
      function: falsy

  workflow-steps-must-not-continue-on-error:
    description: Gate steps must fail closed.
    given: "$.jobs.*.steps[*]"
    severity: error
    then:
      field: continue-on-error
      function: falsy

  workflow-actions-are-approved-and-pinned:
    description: Workflows may only use approved actions pinned to a major version.
    given: "$.jobs.*.steps[*].uses"
    severity: error
    then:
      function: pattern
      functionOptions:
        match: "^(actions/(checkout|dependency-review-action|setup-node|configure-pages|upload-pages-artifact|deploy-pages)|pnpm/action-setup)@v[0-9]+$"

  workflow-run-commands-do-not-weaken-gate:
    description: Shell steps must not bypass or weaken gate execution.
    given: "$.jobs.*.steps[*].run"
    severity: error
    then:
      function: pattern
      functionOptions:
        notMatch: "(\\|\\|\\s*true|--no-verify|continue-on-error|pnpm\\s+run\\s+gate)"

  workflow-has-generic-checks-job:
    description: CI must expose its main quality job as a generic checks job.
    given: "$.jobs"
    severity: error
    then:
      field: checks
      function: truthy

  workflow-uses-node-24:
    description: CI must run on the current supported Node LTS major.
    given: "$.jobs.*.steps[?(@.uses == 'actions/setup-node@v4')].with"
    severity: error
    then:
      field: node-version
      function: enumeration
      functionOptions:
        values: [24, "24"]

  workflow-caches-root-package-lock:
    description: Node setup must cache the root pnpm workspace lockfile.
    given: "$.jobs.*.steps[?(@.uses == 'actions/setup-node@v4')].with"
    severity: error
    then:
      field: cache-dependency-path
      function: pattern
      functionOptions:
        match: "^pnpm-lock\\.yaml$"

  workflow-installs-dependencies-frozen:
    description: A pnpm install in CI must be frozen so it cannot mutate the lockfile.
    given: "$.jobs.*.steps[*].run"
    severity: error
    then:
      function: pattern
      functionOptions:
        notMatch: "(^|\\n)\\s*pnpm\\s+install(?!.*--frozen-lockfile)(\\s|$)"

  workflow-installs-root-workspace:
    description: CI must install the root pnpm workspace from the frozen root lockfile.
    given: "$.jobs.checks.steps"
    severity: error
    then:
      function: schema
      functionOptions:
        schema:
          type: array
          contains:
            type: object
            required: [run]
            properties:
              run:
                type: string
                pattern: "^pnpm install --frozen-lockfile$"

  workflow-installs-browsers-through-harness:
    description: Browser setup must run through the harness package.
    given: "$.jobs.checks.steps"
    severity: error
    then:
      function: schema
      functionOptions:
        schema:
          type: array
          contains:
            type: object
            required: [run]
            properties:
              run:
                type: string
                pattern: "^pnpm --prefix harness run setup:e2e$"

  workflow-runs-harness-gate:
    description: CI must run the full pnpm gate, not a package shortcut.
    given: "$.jobs.checks.steps"
    severity: error
    then:
      function: schema
      functionOptions:
        schema:
          type: array
          contains:
            type: object
            required: [run]
            properties:
              run:
                type: string
                pattern: "^node harness/harness\\.mjs gate$"
